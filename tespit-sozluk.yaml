openapi: 3.0.3
info:
  title: Tespit Sözlük API
  description: >
    Bu API, Yeni nesil bir katılımcı sözlük platformu
    olan Tespit Sözlük'ün yönetilmesi ve işletilmesi için tasarlanmış bir RESTful servistir.
    Temel CRUD (Create, Read, Update, Delete) işlemlerini destekler. Sistem içerisinde
    kullanıcılar özgün başlıklar açabilir, bu başlıklar altında kendi tespitlerini entry olarak
    girebilir ve diğer kullanıcıların içeriklerini oylayabilirler. Ayrıca sistem genelinde kelime
    bazlı arama yapılmasına ve içeriklerin kronolojik veya alfabetik olarak listelenmesine
    olanak tanır. API, JWT tabanlı kimlik doğrulama ile korunmaktadır.
    
    ## Özellikler
    - 1. Kullanıcı Kaydı (POST)
    - 2. Kullanıcı Girişi (POST)
    - 3. Profil Görüntüleme (GET)
    - 4. Başlıkları Listeleme (GET)
    - 5. Alfabetik Başlık Listeleme (GET)
    - 6. Yeni Başlık Açma (POST)
    - 7. Başlık Silme (DELETE)
    - 8. Entry Girme (POST)
    - 9. Entry Düzenleme (PUT)
    - 10. Entry Silme (DELETE)
    - 11. Entry Oylama (POST)
    - 12. Arama Yapma (GET)
    - 13. Rastgele İçerik Listeleme (GET)
    - 14. Çıkış Yapma (POST)
    - JWT tabanlı kimlik doğrulama
  version: 1.0.0
  contact:
    name: Solo Team - Selim Kırış
    email: selimkiris1@gmail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

tags:
  - name: Auth
    description: Kimlik doğrulama ve kullanıcı kayıt işlemleri
  - name: Users
    description: Kullanıcı profil işlemleri
  - name: Topics
    description: Başlık (Topic) işlemleri
  - name: Entries
    description: İçerik (Entry) ve oylama işlemleri
  - name: Search
    description: Sistem geneli arama işlemleri

paths:
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: 1. Kullanıcı Kaydı
      description: Sisteme yeni bir kullanıcı kaydeder ve hesap oluşturur.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
            examples:
              example1:
                summary: Örnek kullanıcı kaydı
                value:
                  username: selimkiris
                  email: selimkiris1@gmail.com
                  password: GuvenliPassword123!
      responses:
        '201':
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email adresi veya kullanıcı adı zaten kullanımda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: 2. Kullanıcı Girişi
      description: Email ve şifre ile giriş yapar, JWT token döner.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCredentials'
            examples:
              example1:
                summary: Örnek giriş isteği
                value:
                  email: selimkiris1@gmail.com
                  password: GuvenliPassword123!
      responses:
        '200':
          description: Giriş başarılı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: 14. Çıkış Yapma
      description: Kullanıcının aktif JWT oturumunu güvenli bir şekilde sonlandırır.
      operationId: logoutUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Çıkış başarılı
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/users/{userId}:
    get:
      tags:
        - Users
      summary: 3. Profil Görüntüleme
      description: ID'si verilen kullanıcının profil bilgilerini getirir.
      operationId: getUserProfile
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Başarılı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/topics/latest:
    get:
      tags:
        - Topics
      summary: 4. Başlıkları Listeleme
      description: Son entry girilen başlıkları kronolojik olarak listeler (Sol panel akışı).
      operationId: getLatestTopics
      responses:
        '200':
          description: Başarılı liste
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Topic'

  /api/topics/alphabetical:
    get:
      tags:
        - Topics
      summary: 5. Alfabetik Başlık Listeleme
      description: Sistemdeki tüm başlıkları A-Z'ye alfabetik olarak listeler.
      operationId: getAlphabeticalTopics
      responses:
        '200':
          description: Başarılı alfabetik liste
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Topic'

  /api/topics:
    post:
      tags:
        - Topics
      summary: 6. Yeni Başlık Açma
      description: Belirtilen konu hakkında sistemde yeni bir başlık açar.
      operationId: createTopic
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicInput'
            examples:
              example1:
                summary: Örnek başlık açma
                value:
                  title: "Yapay zekanın yazılım mühendisliğine etkisi"
      responses:
        '201':
          description: Başlık başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/topics/{topicId}:
    delete:
      tags:
        - Topics
      summary: 7. Başlık Silme
      description: Yetkili bir kullanıcının veya yöneticinin başlığı tamamen kaldırması.
      operationId: deleteTopic
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TopicIdParam'
      responses:
        '204':
          description: Başlık başarıyla silindi
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Bu işlem için yetkiniz bulunmuyor
        '404':
          $ref: '#/components/responses/NotFound'

  /api/entries:
    post:
      tags:
        - Entries
      summary: 8. Entry Girme
      description: Mevcut bir başlık altına yeni bir içerik (entry) ekler.
      operationId: createEntry
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntryInput'
            examples:
              example1:
                summary: Örnek entry ekleme
                value:
                  topicId: "tpc_987654"
                  content: "Bu konu hakkında benim de şöyle bir tespitim var..."
      responses:
        '201':
          description: Entry başarıyla eklendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/entries/{entryId}:
    put:
      tags:
        - Entries
      summary: 9. Entry Düzenleme
      description: Kullanıcının kendi yazdığı entry'nin içeriğini günceller.
      operationId: updateEntry
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
            examples:
              example1:
                summary: Örnek entry güncelleme
                value:
                  content: "Düzeltilmiş entry içeriği buraya gelecek."
      responses:
        '200':
          description: Entry başarıyla güncellendi
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Entries
      summary: 10. Entry Silme
      description: Kullanıcının kendi yazdığı entry'yi sistemden siler.
      operationId: deleteEntry
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryIdParam'
      responses:
        '204':
          description: Entry başarıyla silindi
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/entries/{entryId}/vote:
    post:
      tags:
        - Entries
      summary: 11. Entry Oylama
      description: Yazarların entry'lere olumlu (upvote) veya olumsuz (downvote) puan vermesi.
      operationId: voteEntry
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteInput'
            examples:
              example1:
                summary: Olumlu oy verme
                value:
                  voteType: "upvote"
      responses:
        '200':
          description: Oylama başarılı
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/search:
    get:
      tags:
        - Search
      summary: 12. Arama Yapma
      description: Sistem genelinde başlıklar ve yazarlar arasında kelime bazlı arama yapar.
      operationId: searchAll
      parameters:
        - name: q
          in: query
          required: true
          description: Aranacak kelime
          schema:
            type: string
      responses:
        '200':
          description: Arama sonuçları
          content:
            application/json:
              schema:
                type: object
                properties:
                  topics:
                    type: array
                    items:
                      $ref: '#/components/schemas/Topic'
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/entries/random:
    get:
      tags:
        - Entries
      summary: 13. Rastgele İçerik Listeleme
      description: Farklı başlıklardan rastgele seçilen entryleri getirir.
      operationId: getRandomEntries
      responses:
        '200':
          description: Rastgele entryler başarıyla getirildi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Entry'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserIdParam:
      name: userId
      in: path
      required: true
      description: Kullanıcının benzersiz ID'si
      schema:
        type: string
    TopicIdParam:
      name: topicId
      in: path
      required: true
      description: Başlığın benzersiz ID'si
      schema:
        type: string
    EntryIdParam:
      name: entryId
      in: path
      required: true
      description: Entry'nin benzersiz ID'si
      schema:
        type: string

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time

    UserRegistration:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginCredentials:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthToken:
      type: object
      properties:
        token:
          type: string
          description: JWT Bearer token
        expiresIn:
          type: integer
          description: Token geçerlilik süresi (saniye)

    Topic:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        authorId:
          type: string
        createdAt:
          type: string
          format: date-time
        entryCount:
          type: integer

    TopicInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 3

    Entry:
      type: object
      properties:
        id:
          type: string
        topicId:
          type: string
        authorId:
          type: string
        content:
          type: string
        upvotes:
          type: integer
        downvotes:
          type: integer
        createdAt:
          type: string
          format: date-time

    EntryInput:
      type: object
      required:
        - topicId
        - content
      properties:
        topicId:
          type: string
        content:
          type: string
          minLength: 1

    VoteInput:
      type: object
      required:
        - voteType
      properties:
        voteType:
          type: string
          enum: [upvote, downvote]

    Error:
      type: object
      properties:
        message:
          type: string

  responses:
    BadRequest:
      description: Geçersiz istek verisi
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Kimlik doğrulama başarısız veya yetki yok
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: İstenen kaynak bulunamadı
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'